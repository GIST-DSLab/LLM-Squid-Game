# Render Blueprint for the LLM Squid Game Web Arena backend.
#
# Deploy: connect this repo in the Render dashboard ("New +" -> "Blueprint"),
# point it at this file, and Render provisions the service below. Secrets
# (WEB_ARENA_DSN) are NOT set here (`sync: false`) — set them in the Render
# dashboard after the first deploy. See web/DEPLOY.md for the full walkthrough.
#
# Swapping platforms: the Dockerfile itself is platform-agnostic (reads $PORT,
# WEB_ARENA_DSN, WEB_ARENA_CORS_ORIGINS from the environment), so this file is
# the only Render-specific piece — `fly.toml` (Fly.io) or a Space's
# `README.md` config block (HF Spaces Docker SDK) would replace it 1:1.

services:
  - type: web
    name: squid-game-web-arena-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    branch: main
    healthCheckPath: /api/leaderboard/models
    envVars:
      # Postgres connection string (Supabase free tier recommended — see
      # web/DEPLOY.md). Falls back to a local SQLite file if unset, which is
      # NOT durable on Render's free plan (ephemeral filesystem) — set this.
      - key: WEB_ARENA_DSN
        sync: false
      # Comma-separated list of allowed CORS origins. Must include the
      # GitHub Pages origin the frontend is served from, e.g.
      # "https://irregular6612.github.io". See web/DEPLOY.md for the exact
      # value and how it must line up with web/config.js.
      - key: WEB_ARENA_CORS_ORIGINS
        sync: false
